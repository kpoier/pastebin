<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTRICTED AREA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 5rem;">
        <h1 style="border: none; text-align: center; color: red;">[ RESTRICTED ]</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">AUTHENTICATION REQUIRED</p>
        
        {% if error %}
            <div style="background: #110000; border: 1px dashed red; padding: 1rem; color: red; margin-bottom: 1.5rem; text-align: center; font-weight: bold; text-transform: uppercase;">
                {{ error }}
            </div>
        {% endif %}
        
        <form action="{{ url_for('admin.login') }}" method="post">
            <div class="form-group">
                <input type="text" name="username" placeholder="USERNAME" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="PASSWORD" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
